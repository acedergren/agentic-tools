name: Skill Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate skill library
        run: npm run skills:validate

  install-smoke:
    runs-on: ubuntu-latest
    needs: validate-library
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install smoke test
        run: npm run skills:install-smoke

  secret-scan:
    runs-on: ubuntu-latest
    needs: validate-library
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Secret scan
        run: npm run skills:secrets-check
